version: '3.9'

services:
  # ── PHP-FPM (Laravel API) ────────────────────────────────────────────────
  api:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: dairyform_api
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
    networks:
      - dairyform
    depends_on:
      - db
      - redis

  # ── Nginx reverse-proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: dairyform_nginx
    restart: unless-stopped
    ports:
      - "8000:80"   # API   → http://localhost:8000
      - "3000:3001" # React → http://localhost:3000  (via Vite dev proxy)
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dairyform
    depends_on:
      - api
      - frontend

  # ── React (Vite dev server) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: dairyform_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    command: npm run dev -- --host
    networks:
      - dairyform

  # ── MySQL 8 ──────────────────────────────────────────────────────────────
  db:
    image: mysql:8.3
    container_name: dairyform_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: dairyform
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: dairyform
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - ./docker/data/mysql:/var/lib/mysql
    networks:
      - dairyform

  # ── Redis (cache / queues) ───────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: dairyform_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dairyform

  # ── Queue worker ─────────────────────────────────────────────────────────
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: dairyform_queue
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    command: php artisan queue:work --sleep=3 --tries=3
    networks:
      - dairyform
    depends_on:
      - db
      - redis

networks:
  dairyform:
    driver: bridge
